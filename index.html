<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martians Meet A Clock</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
}

/* Wallpaper */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("https://raw.githubusercontent.com/sweitzel75/mornin/main/yocha.jpg");
    background-repeat: repeat;
    background-size: auto;
    opacity: 0.5;
    z-index: -1;
}

/* Center the video */
.container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    width: 40vw;
    max-width: 900px;
    min-width: 320px;
    height: auto;
    box-shadow: 0 0 30px rgba(255,255,255,0.25);
}
</style>

</head>
<body>

<div class="container">
    <video controls autoplay loop>
        <source src="https://raw.githubusercontent.com/sweitzel75/mornin/main/Sesame%20Street%EF%BC%9A%20Martians%20Meet%20A%20Clock.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>
</div>

</body>
</html>
