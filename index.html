<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOOD MORNING MEME APOCALYPSE</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #222, #000);
    font-family: Arial, sans-serif;
}

#container {
    position: fixed;
    inset: 0;
    overflow: hidden;
}

.meme {
    position: absolute;
    pointer-events: none;
    user-select: none;
    will-change: transform;
    border-radius: 8px;
    box-shadow:
        0 0 10px rgba(255,255,255,0.4),
        0 0 30px rgba(255,255,255,0.2);
}

.banner {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 900;
    color: #fff;
    text-shadow:
        0 0 10px yellow,
        0 0 20px orange,
        0 0 40px red;
    z-index: 9999;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="banner">!! GOOD MORNING !!</div>
<div id="container"></div>

<script>
const GIFS = [
    "https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif",
    "https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif",
    "https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif",
    "https://media.giphy.com/media/xT9IgG50Fb7Mi0prBC/giphy.gif",
    "https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif",
    "https://usagif.com/wp-content/uploads/gifs/new-goodmorning-17.gif",
"https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM24zZDNha3Zhb201eG42ZG90Z3dubGFxMXliZHowZ25scmRlcDRrcCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/W57SJHPGrf7ufXSwiE/giphy.gif",
"https://snahc.org/wp-content/uploads/2016/12/yochadehe.jpg"
];

const MEME_COUNT = 250;
const memes = [];
const container = document.getElementById("container");

function rand(min, max) {
    return Math.random() * (max - min) + min;
}

function createMeme() {
    const img = document.createElement("img");

    const size = rand(80, 260);

    img.src = GIFS[Math.floor(Math.random() * GIFS.length)];
    img.className = "meme";

    img.style.width = size + "px";
    img.style.height = size + "px";

    container.appendChild(img);

    return {
        el: img,
        x: rand(0, innerWidth - size),
        y: rand(0, innerHeight - size),
        vx: rand(-4, 4),
        vy: rand(-4, 4),
        rotation: rand(0, 360),
        spin: rand(-3, 3),
        size
    };
}

for (let i = 0; i < MEME_COUNT; i++) {
    memes.push(createMeme());
}

function animate() {
    for (const m of memes) {

        m.x += m.vx;
        m.y += m.vy;

        if (m.x <= 0 || m.x + m.size >= innerWidth) {
            m.vx *= -1;
        }

        if (m.y <= 0 || m.y + m.size >= innerHeight) {
            m.vy *= -1;
        }

        m.rotation += m.spin;

        m.el.style.transform =
            `translate(${m.x}px, ${m.y}px) rotate(${m.rotation}deg)`;
    }

    requestAnimationFrame(animate);
}

animate();

setInterval(() => {
    for (const m of memes) {
        m.vx += rand(-0.5, 0.5);
        m.vy += rand(-0.5, 0.5);

        m.vx = Math.max(-8, Math.min(8, m.vx));
        m.vy = Math.max(-8, Math.min(8, m.vy));
    }
}, 1000);

window.addEventListener("resize", () => {
    memes.forEach(m => {
        m.x = Math.min(m.x, innerWidth - m.size);
        m.y = Math.min(m.y, innerHeight - m.size);
    });
});
</script>

</body>
</html>
